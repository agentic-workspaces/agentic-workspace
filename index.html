<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agentic Workspace Protocol — Draft</title>
    <meta
      name="description"
      content="Draft spec for the Agentic Workspace Protocol — environments where humans and agents collaborate on shared resources."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --ink: #111111;
        --muted: #444444;
        --line: #b5b5b5;
        --code: #f7f7f7;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", monospace;
        background: var(--bg);
        color: var(--ink);
      }

      a {
        color: var(--ink);
        text-underline-offset: 0.18rem;
      }

      code, pre { font-family: inherit; }

      .page {
        max-width: 96ch;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }

      .hero {
        padding: 0 0 1rem;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 0.5rem;
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hero-links {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 0.9rem;
      }

      .status {
        margin: 0.9rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .document {
        margin-top: 1.25rem;
      }

      .document h1, .document h2, .document h3, .document h4 {
        line-height: 1.35;
        scroll-margin-top: 1rem;
        font-weight: 700;
      }

      .document h1 { font-size: 1.45rem; }
      .document h2 { margin-top: 1.9rem; font-size: 1.2rem; }
      .document h3 { margin-top: 1.35rem; font-size: 1.05rem; }

      .document p, .document li { line-height: 1.65; }

      .document pre {
        overflow-x: auto;
        padding: 0.85rem 1rem;
        background: var(--code);
        border: 1px solid var(--line);
      }

      .document code {
        padding: 0.05rem 0.2rem;
        background: var(--code);
      }

      .document pre code {
        padding: 0;
        background: transparent;
      }

      .document blockquote {
        margin: 1rem 0;
        padding-left: 1rem;
        border-left: 1px solid var(--line);
        color: var(--muted);
      }

      .document hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 1.75rem 0;
      }

      .error {
        padding: 1rem;
        border: 1px solid var(--line);
        background: #fbfbfb;
      }

      @media (max-width: 720px) {
        .page { padding: 1rem 0.75rem 2rem; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Draft / March 2026</p>
        <div class="hero-links">
          <a href="https://github.com/niquola/agentic-workspace">Repository</a>
          <a href="./agent-workspace.md">Markdown Source</a>
        </div>
        <p id="status" class="status">Loading spec...</p>
      </section>

      <article id="content" class="document" aria-live="polite"></article>

      <noscript>
        <p class="error">
          This page renders <code>agent-workspace.md</code> in the browser and requires JavaScript.
          You can read the source at <a href="./agent-workspace.md">agent-workspace.md</a>.
        </p>
      </noscript>
    </main>

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const content = document.getElementById("content");
      const status = document.getElementById("status");

      const escapeHtml = (v) =>
        v.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");

      const slugify = (v) =>
        v.toLowerCase().trim().replace(/[^\w\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-");

      marked.use({
        gfm: true,
        renderer: {
          heading(token) {
            const html = this.parser.parseInline(token.tokens);
            const id = slugify(token.text ?? "");
            return `<h${token.depth} id="${id}">${html}</h${token.depth}>`;
          },
          code(token) {
            const lang = (token.lang ?? "").trim();
            const code = token.text ?? "";
            const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
            return `<pre><code${cls}>${escapeHtml(code)}</code></pre>`;
          },
        },
      });

      try {
        const res = await fetch("./agent-workspace.md", { cache: "no-store" });
        if (!res.ok) throw new Error(`Failed to load (${res.status})`);
        content.innerHTML = marked.parse(await res.text());
        status.textContent = "Rendered from agent-workspace.md";
      } catch (err) {
        status.textContent = "Unable to render";
        content.innerHTML = `
          <div class="error">
            <p>Failed to render the spec.</p>
            <p><a href="./agent-workspace.md">Open the markdown source</a>.</p>
            <p><code>${String(err.message ?? err)}</code></p>
          </div>`;
      }
    </script>
  </body>
</html>
